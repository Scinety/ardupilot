name: Build Firmware (MicoAir743v2 + Scripting)

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
          pip install empy==3.3.4 pexpect future lxml pymavlink

      - name: Configure
        run: |
          ./waf configure --board MicoAir743v2 --enable-scripting

      - name: Build
        run: |
          ./waf rover

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: MicoAir743v2-rover-scripting
          path: |
            build/MicoAir743v2/bin/ardurover.apj
            build/MicoAir743v2/bin/ardurover.bin
